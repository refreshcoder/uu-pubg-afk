<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if device.key %}编辑设备{% else %}新增设备{% endif %}</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <h1>{% if device.key %}编辑设备{% else %}新增设备{% endif %}</h1>
          <p>设备配置会保存在 data/devices.yaml；密码属于敏感信息，请确保该目录权限安全。</p>
        </div>
        <div class="actions">
          <a class="btn" href="{% if device.key %}/devices/{{ device.key }}{% else %}/{% endif %}">返回</a>
          <button class="btn primary" onclick="PUBG_AFK_UI.saveDevice('{{ device.key }}')">保存</button>
        </div>
      </div>

      <div class="split">
        <div class="panel">
          <h2>基础信息</h2>
          <form data-device-form onsubmit="return false;">
            <div class="field">
              <label>设备名称</label>
              <input name="name" value="{{ device.name }}" placeholder="例如：PUBG-01" />
            </div>
            <div class="field">
              <label>远控 ID（RustDesk）</label>
              <input name="target_id" value="{{ device.target_id }}" placeholder="例如：123456789" />
            </div>
            <div class="field">
              <label>远控密码</label>
              <input name="target_password" value="{{ device.target_password }}" placeholder="密码" />
            </div>
            <div class="field">
              <label>DISPLAY</label>
              <input name="display" value="{{ device.display }}" placeholder=":99" />
              <div class="hint">无头环境默认 :99；有桌面环境可用 :0 / :1 等</div>
            </div>
            <div class="field">
              <label>备注</label>
              <input name="note" value="{{ device.note }}" placeholder="可选" />
            </div>
          </form>
        </div>

        <div class="panel">
          <h2>覆盖配置（YAML）</h2>
          <div class="hint">只写需要覆盖的字段，会与仓库根目录 config.yaml 深度合并。</div>
          <div style="height: 10px"></div>
          <textarea name="override_config_yaml" form="none" placeholder="例如:\nloop:\n  interval_seconds:\n    min: 300\n    max: 360\n">{{ device.override_config_yaml }}</textarea>
          <div style="height: 10px"></div>
          <div class="hint">启动时会自动把本次运行时长写入 run.auto_exit_after_seconds。</div>
        </div>
      </div>
    </div>
    <script>
      const ta = document.querySelector("textarea[name=override_config_yaml]")
      const form = document.querySelector("form[data-device-form]")
      form.appendChild(ta)
    </script>
  </body>
</html>
