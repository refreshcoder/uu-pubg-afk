run:
  auto_exit_after_seconds: 21900

loop:
  interval_seconds:
    min: 280
    max: 320
  window_init_wait_seconds: 15

movement:
  mouse:
    offset_x:
      min: -60
      max: 60
    offset_y:
      min: -20
      max: 20
    move_duration_seconds: 0.1
    right_click:
      hold_seconds: 0.1
      double_click_interval_seconds:
        min: 2
        max: 4

  keyboard:
    wasd_keys: ["w", "s", "a", "d"]
    hold_seconds:
      min: 0.1
      max: 0.18
    opp_sleep_seconds: 0.05

    qe_keys: ["q", "e"]
    qe_times:
      min: 2
      max: 5
    qe_hold_seconds:
      min: 0.03
      max: 0.07
    qe_interval_seconds:
      min: 0.05
      max: 0.15

rustdesk:
  connection:
    connect_timeout_seconds: 30
    connect_retries: 3
